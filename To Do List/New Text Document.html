        }

        .category-task-input:focus {
            border-color: #5B9BD5;
            box-shadow: 0 0 0 3px rgba(91, 155, 213, 0.2);
        }

        .category-add-btn {
            border: none;
            border-radius: 10px;
            padding: 0 16px;
            color: #FFFFFF;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #45B39D 0%, #2E86C1 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 6px 14px rgba(46, 134, 193, 0.25);
        }

        .category-add-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
            box-shadow: 0 10px 16px rgba(46, 134, 193, 0.3);
        }

        .category-add-btn:active {
            transform: translateY(0);
        }

        .task-meta-input {
            min-width: 0;
            border: 1px solid #D8C6B0;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 12px;
            color: #4A3B2E;
            background: #FFFDF8;
            outline: none;
        }

        .task-meta-input.small {
            width: 92px;
            flex: 0 0 auto;
        }

        .task-meta-input.grow {
            flex: 1;
        }

        .category-task-meta {
            margin-top: 5px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .category-task-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            position: relative;
            z-index: 2;
        }

        .category-task-item {
            background: linear-gradient(135deg, #F5EFE7 0%, #EBE3DA 100%);
            border-left: 4px solid #D97D4F;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .category-task-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .category-task-body .task-text {
            color: #433426;
            line-height: 1.35;
            word-break: break-word;
        }

        .delete-task-btn {
            border: none;
            border-radius: 8px;
            padding: 7px 10px;
            color: #FFFFFF;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.3px;
            cursor: pointer;
            background: linear-gradient(135deg, #F05A7E 0%, #E74C3C 100%);
            transition: transform 0.18s ease, filter 0.18s ease;
            flex-shrink: 0;
        }

        .delete-task-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .category-task-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .category-task-date {
            color: #6A5A4A;
            font-size: 12px;
            font-weight: 700;
        }

        .category-empty {
            color: #6A5A4A;
            font-style: italic;
            margin-top: 12px;
        }

        /* Book-like Turning Page */
        .book-pages {
            display: flex;
            align-items: stretch;
        }

        .left-page {
            position: relative;
            width: 50%;
            height: 100%;
            z-index: 1;
        }

        .book__page {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: 0% 50%;
            transition: transform 1.55s cubic-bezier(0.645, 0.045, 0.355, 1);
            overflow: visible;
            z-index: 6;
        }

        .book__page-front,
        .book__page-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            overflow: visible;
        }

        /* Prevent front-side picker artifacts from showing after the page flips */
        .book-open.category-open .book__page-front .pentagon-container {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .book-open:not(.category-open) .book__page-front .pentagon-container {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .book__page-front {
            transform: rotateY(0deg);
        }

        .book__page-back {
            transform: rotateY(180deg);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .book-open:not(.category-open) .book__page-back {
            visibility: hidden;
        }

        .book-open.book-turning .book__page-back {
            visibility: visible;
        }

        .book-open.category-open .book__page-back {
            visibility: visible;
        }

        .book-open.category-open .book__page {
            transform: rotateY(-180deg);
        }

        /* Hide right brown edge and spine while page is away from right side */
        .book-open.right-away {
            background: linear-gradient(90deg, #7b5337 0%, #9b6d4f 6%, #FEFDFB 6%, #F5F0E8 100%);
        }

        .book-open.right-away::before {
            opacity: 0;
        }

        .book-open.book-turning .book__page {
            pointer-events: none;
        }

        .book__page-front .right-page,
        .book__page-back .category-page {
            position: relative;
            width: 100%;
            min-width: 100%;
            max-width: 100%;
            flex: 0 0 100%;
            height: 100%;
            left: auto;
            right: auto;
            display: flex;
            box-sizing: border-box;
            border-radius: 0 10px 10px 0;
        }

        .pentagon-container,
        .pentagon,
        .petal {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .book__page-back .category-page {
            border-radius: 10px 0 0 10px;
            padding-left: 24px;
            margin-left: 0;
        }

        .book__page-front .right-page {
            border-left: 1px solid #D4C4B0;
        }

        /* Hidden initially */
        .book-scene {
            display: flex;
        }

        .book-open {
            display: none;
        }

        .book-closed.show-book {
            display: none;
        }

        .book-open.show-book {
            display: block;
        }

    </style>
</head>
<body>
    <div class="reminder-hub" id="reminderHub"></div>
    <div class="book-scene" id="bookScene">
        <!-- Closed Book -->
        <div class="book-closed" id="closedBook">
            <div class="book-spine"></div>
            <div class="book-title">My Tasks</div>
            <div class="book-decoration"></div>
        </div>

        <!-- Open Book -->
        <div class="book-open" id="openBook">
        <div class="book-pages">
            <!-- Left Page - Calendar and Tasks -->
            <div class="page left-page" id="leftPage">
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="nav-btn" id="prevMonth">‹</button>
                        <h2 class="calendar-title" id="calendarTitle">April 2026</h2>
                        <button class="nav-btn" id="nextMonth">›</button>
                    </div>
                    <div class="calendar-tools">
                        <button class="dark-mode-btn" id="darkModeToggle">Dark Mode</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Calendar days will be generated by JavaScript -->
                    </div>
                </div>
                <div class="task-display" id="taskDisplay">
                    <h3>Select a date to view tasks to do</h3>
                </div>
                <button id="clearAllTasksBtn" style="margin-top: 4px; margin-bottom: 0; padding: 6px 10px; background-color: #ff6b6b; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; flex: 0 0 auto;">Clear All Tasks</button>
                <div class="kanban-board" id="kanbanBoard">
                    <h3 class="kanban-title">Kanban (Select a date)</h3>
                </div>
            </div>

            <div class="book__page book__page--2" id="turningPage">
                <div class="book__page-front">
                    <!-- Right Page - Pentagon Icon -->
                    <div class="page right-page" id="rightPage">
                        <div class="pentagon-container" id="pentagonContainer">
                            <div class="pentagon" id="mainPentagon"></div>
                            <div class="petal petal-1" data-category="Work"></div>
                            <div class="petal petal-2" data-category="Edu"></div>
                            <div class="petal petal-3" data-category="Chores"></div>
                            <div class="petal petal-4" data-category="Others"></div>
                            <div class="petal petal-5" data-category="Personal"></div>
                            <div class="petal petal-6" data-category="Health"></div>
                        </div>
                    </div>
                </div>
                <div class="book__page-back">
                    <div class="page category-page" id="categoryPage">
                        <div class="category-header">
                            <h2 class="category-title" id="categoryTitle">Category Tasks</h2>
                            <button class="back-btn" id="backToBook">Back to Book</button>
                        </div>
                        <div class="category-composer">
                            <div class="composer-row">
                                <input type="text" class="category-task-input" id="categoryTaskInput" placeholder="Type a task for this category..." maxlength="120">
                                <button class="category-add-btn" id="addCategoryTaskBtn">Add</button>
                            </div>
                            <div class="composer-row">
                                <select class="task-meta-input small" id="taskPriority">
                                    <option value="medium">Priority: Medium</option>
                                    <option value="high">Priority: High</option>
                                    <option value="low">Priority: Low</option>
                                </select>
                                <select class="task-meta-input small" id="taskRecurring">
                                    <option value="none">Repeat: None</option>
                                    <option value="daily">Repeat: Daily</option>
                                    <option value="weekly">Repeat: Weekly</option>
                                    <option value="monthly">Repeat: Monthly</option>
                                </select>
                                <input type="datetime-local" class="task-meta-input grow" id="taskDueAt" title="Due date/time">
                            </div>
                            <div class="composer-row">
                                <input type="text" class="task-meta-input grow" id="taskTags" placeholder="Tags (comma separated)">
                                <select class="task-meta-input small" id="taskReminderMinutes" title="Reminder before due time">
                                    <option value="0">Reminder: Off</option>
                                    <option value="10">10 min early</option>
                                    <option value="30">30 min early</option>
                                    <option value="60">1 hr early</option>
                                </select>
                            </div>
                        </div>
                        <div class="category-task-list" id="categoryTaskList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div><!-- end book-scene -->

    <script>
        // DOM Elements
        const bookScene = document.getElementById('bookScene');
        const closedBook = document.getElementById('closedBook');
        const openBook = document.getElementById('openBook');
        const leftPage = document.getElementById('leftPage');
        const rightPage = document.getElementById('rightPage');
        const calendarTitle = document.getElementById('calendarTitle');
        const calendarGrid = document.getElementById('calendarGrid');
        const taskDisplay = document.getElementById('taskDisplay');
        const prevMonth = document.getElementById('prevMonth');
        const nextMonth = document.getElementById('nextMonth');
        const pentagonContainer = document.getElementById('pentagonContainer');
        const turningPage = document.getElementById('turningPage');
        const petals = document.querySelectorAll('.petal');
        const categoryPage = document.getElementById('categoryPage');
        const categoryTitle = document.getElementById('categoryTitle');
        const categoryTaskInput = document.getElementById('categoryTaskInput');
        const addCategoryTaskBtn = document.getElementById('addCategoryTaskBtn');
        const categoryTaskList = document.getElementById('categoryTaskList');
        const backToBook = document.getElementById('backToBook');
        const taskPriority = document.getElementById('taskPriority');
        const taskRecurring = document.getElementById('taskRecurring');
        const taskDueAt = document.getElementById('taskDueAt');
        const taskTags = document.getElementById('taskTags');
        const taskReminderMinutes = document.getElementById('taskReminderMinutes');
        const kanbanBoard = document.getElementById('kanbanBoard');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const reminderHub = document.getElementById('reminderHub');
        const pageTurnDuration = 1550;
        let isTurningPage = false;
        let activeCategory = 'Others';

        // Calendar state
        let currentDate = new Date();
        let selectedDate = null;

        // Task storage
        let completedTasks = JSON.parse(localStorage.getItem('completedTasks')) || {};

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Clear old corrupted tasks on first visit
            if (!localStorage.getItem('tasksInitialized')) {
                completedTasks = {};
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
                localStorage.setItem('tasksInitialized', 'true');
            } else {
                // On subsequent visits, reload from storage
                completedTasks = JSON.parse(localStorage.getItem('completedTasks')) || {};
            }
            
            normalizeStoredTasks();
            materializeRecurringTasksUpTo(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0));
            applySavedTheme();
            renderCalendar();
            updateTaskDisplay();
            renderKanban();

            setInterval(checkReminders, 30000);
        });

        // Book opening animation
        closedBook.addEventListener('click', function() {
            closedBook.classList.add('show-book');
            openBook.classList.add('show-book');
        });

        // Calendar navigation
        prevMonth.addEventListener('click', function() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
            selectedDate = null;
            updateTaskDisplay();
        });

        nextMonth.addEventListener('click', function() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            materializeRecurringTasksUpTo(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0));
            renderCalendar();
            selectedDate = null;
            updateTaskDisplay();
            renderKanban();
        });

        darkModeToggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('themeMode', mode);
            darkModeToggle.textContent = mode === 'dark' ? 'Light Mode' : 'Dark Mode';
        });

        // Pentagon click animation
        let isExpanded = false;
        pentagonContainer.addEventListener('click', function(event) {
            if (event.target.closest('.petal')) {
                return;
            }

            isExpanded = !isExpanded;
            if (isExpanded) {
                pentagonContainer.classList.add('expanded');
            } else {
                pentagonContainer.classList.remove('expanded');
            }
        });

        petals.forEach(function(petal) {
            petal.addEventListener('click', function(event) {
                event.stopPropagation();
                openCategoryPage(petal.dataset.category);
            });
        });

        backToBook.addEventListener('click', function() {
            if (isTurningPage) {
                return;
            }

            runPageTurn(false);
            
            // After returning to book, highlight today's date automatically if tasks were added
            setTimeout(function() {
                const todayElement = document.querySelector('.calendar-day.today');
                if (todayElement && completedTasks[new Date().toISOString().split('T')[0]]) {
                    document.querySelectorAll('.calendar-day.selected').forEach(el => {
                        el.classList.remove('selected');
                    });
                    todayElement.classList.add('selected');
                    selectedDate = new Date();
                    updateTaskDisplay();
                }
            }, pageTurnDuration + 100);
        });

        addCategoryTaskBtn.addEventListener('click', function() {
            if (window.Notification && Notification.permission === 'default') {
                Notification.requestPermission();
            }
            addTaskFromCategoryInput();
        });

        categoryTaskInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                addTaskFromCategoryInput();
            }
        });

        categoryTaskList.addEventListener('click', function(event) {
            const deleteButton = event.target.closest('.delete-task-btn');
            if (!deleteButton) {
                return;
            }

            const dateKey = deleteButton.dataset.dateKey;
            const taskIndex = Number(deleteButton.dataset.taskIndex);
            deleteCategoryTask(dateKey, taskIndex);
        });

        taskDisplay.addEventListener('click', function(event) {
            const doneButton = event.target.closest('.task-done-btn');
            if (!doneButton) {
                return;
            }

            const dateKey = doneButton.dataset.dateKey;
            const taskIndex = Number(doneButton.dataset.taskIndex);
            toggleTaskDone(dateKey, taskIndex);
        });

        kanbanBoard.addEventListener('click', function(event) {
            const nextButton = event.target.closest('.kanban-next-btn');
            if (!nextButton) {
                return;
            }

            const dateKey = nextButton.dataset.dateKey;
            const taskIndex = Number(nextButton.dataset.taskIndex);
            cycleTaskStatus(dateKey, taskIndex);
        });

        // Clear all tasks button
        const clearAllTasksBtn = document.getElementById('clearAllTasksBtn');
        clearAllTasksBtn.addEventListener('click', function() {
            if (confirm('Are you sure you want to clear all tasks? This cannot be undone.')) {
                completedTasks = {};
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
                renderCalendar();
                taskDisplay.innerHTML = '<h3>All tasks cleared. Select a date to view tasks to do</h3>';
                renderCategoryTasks(activeCategory);
                renderKanban();
            }
        });

        // Render calendar
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            calendarTitle.textContent = new Date(year, month).toLocaleDateString('en-US', {
                month: 'long',
                year: 'numeric'
            });

            calendarGrid.innerHTML = '';

            // Day names
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const dayElement = document.createElement('div');
                dayElement.className = 'day-name';
                dayElement.textContent = day;
                calendarGrid.appendChild(dayElement);
            });

            // Get first day of month and last day
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            // Generate calendar days
            for (let i = 0; i < 42; i++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';

                const currentDay = new Date(startDate);
                currentDay.setDate(startDate.getDate() + i);

                const dayNumber = currentDay.getDate();
                const isCurrentMonth = currentDay.getMonth() === month;

                if (isCurrentMonth) {
                    dayElement.textContent = dayNumber;

                    // Check if today
                    const today = new Date();
                    if (currentDay.toDateString() === today.toDateString()) {
                        dayElement.classList.add('today');
                    }

                    // Check if has tasks
                    const dateKey = currentDay.toISOString().split('T')[0];
                    if (completedTasks[dateKey] && completedTasks[dateKey].length > 0) {
                        dayElement.classList.add('has-tasks');
                    }

                    // Click handler
                    dayElement.addEventListener('click', function() {
                        // Remove previous selection
                        document.querySelectorAll('.calendar-day.selected').forEach(el => {
                            el.classList.remove('selected');
                        });

                        // Select this day
                        dayElement.classList.add('selected');
                        selectedDate = new Date(currentDay);
                        updateTaskDisplay();
                    });
                }

                calendarGrid.appendChild(dayElement);
            }
        }

        // Update task display
        function updateTaskDisplay() {
            if (!selectedDate) {
                taskDisplay.innerHTML = '<h3>Select a date to view tasks to do</h3>';
                renderKanban();
                return;
            }

            const dateKey = selectedDate.toISOString().split('T')[0];
            const tasks = completedTasks[dateKey] || [];

            let html = `<h3>Tasks to do for ${selectedDate.toLocaleDateString()}</h3>`;

            if (tasks.length === 0) {
                html += '<p style="color: #666; font-style: italic;">No tasks to do on this date.</p>';
            } else {
                const preferredCategoryOrder = ['Work', 'Edu', 'Chores', 'Personal', 'Health', 'Others'];
                const indexedTasks = tasks.map(function(task, index) {
                    return {
                        task: task,
                        index: index
                    };
                });

                const tasksByCategory = {};
                indexedTasks.forEach(function(entry) {
                    const category = entry.task.category || 'Others';
                    if (!tasksByCategory[category]) {
                        tasksByCategory[category] = [];
                    }
                    tasksByCategory[category].push(entry);
                });

                const allCategories = Object.keys(tasksByCategory);
                const orderedCategories = preferredCategoryOrder.filter(function(name) {
                    return allCategories.includes(name);
                });
                const remainingCategories = allCategories.filter(function(name) {
                    return !preferredCategoryOrder.includes(name);
                }).sort();

                orderedCategories.concat(remainingCategories).forEach(function(categoryName) {
                    html += `<div class="task-category-group"><h4 class="task-category-title">${escapeHtml(categoryName)}</h4>`;

                    tasksByCategory[categoryName].forEach(function(entry) {
                        const task = entry.task;
                        const isDone = Boolean(task.done);
                        const priorityClass = 'priority-' + escapeHtml(task.priority || 'medium');
                        const tagBadges = (task.tags || []).map(function(tag) {
                            return `<span class="task-badge">#${escapeHtml(tag)}</span>`;
                        }).join('');

                        let metaBadges = `<span class="task-badge ${priorityClass}">${escapeHtml(task.priority || 'medium')}</span>`;
                        if (task.recurring && task.recurring !== 'none') {
                            metaBadges += `<span class="task-badge">${escapeHtml(task.recurring)}</span>`;
                        }
                        if (task.dueAt) {
                            const dueLabel = new Date(task.dueAt).toLocaleString();
                            metaBadges += `<span class="task-badge">Due ${escapeHtml(dueLabel)}</span>`;
                        }

                        html += `
                            <div class="completed-task ${isDone ? 'is-done' : ''}">
                                <div class="task-main">
                                    <span class="task-text">${escapeHtml(task.text)}</span>
                                    <span class="task-time">${escapeHtml(task.time || '--:--')}</span>
                                    <div class="task-badges">${metaBadges}${tagBadges}</div>
                                </div>
                                <button
                                    class="task-done-btn ${isDone ? 'is-done' : ''}"
                                    data-date-key="${dateKey}"
                                    data-task-index="${entry.index}"
                                    title="Mark task as finished"
                                    aria-label="Mark task as finished"
                                >${isDone ? '✓' : '○'}</button>
                            </div>
                        `;
                    });

                    html += '</div>';
                });
            }

            taskDisplay.innerHTML = html;
            renderKanban();
        }

        function openCategoryPage(categoryName) {
            if (isTurningPage) {
                return;
            }

            activeCategory = categoryName;
            categoryTitle.textContent = categoryName + ' Tasks';
            renderCategoryTasks(categoryName);
            categoryTaskInput.placeholder = 'Add a ' + categoryName + ' task...';
            categoryTaskInput.value = '';

            runPageTurn(true);
        }

        function addTaskFromCategoryInput() {
            const text = categoryTaskInput.value.trim();
            if (!text) {
                return;
            }

            const now = new Date();
            const dateKey = now.toISOString().split('T')[0];
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

            if (!completedTasks[dateKey]) {
                completedTasks[dateKey] = [];
            }

            const normalizedTags = taskTags.value
                .split(',')
                .map(function(value) { return value.trim(); })
                .filter(Boolean);

            const dueAtValue = taskDueAt.value ? new Date(taskDueAt.value).toISOString() : null;
            const reminderMinutes = Number(taskReminderMinutes.value || 0);
            let reminderAt = null;
            if (dueAtValue && reminderMinutes > 0) {
                const dueMs = new Date(dueAtValue).getTime();
                reminderAt = new Date(dueMs - reminderMinutes * 60 * 1000).toISOString();
            }

            const taskId = createTaskId();

            completedTasks[dateKey].push({
                id: taskId,
                text: text,
                time: time,
                category: activeCategory,
                done: false,
                status: 'todo',
                priority: taskPriority.value || 'medium',
                tags: normalizedTags,
                recurring: taskRecurring.value || 'none',
                recurrenceRootId: taskId,
                isRecurringInstance: false,
                dueAt: dueAtValue,
                reminderAt: reminderAt,
                reminderSent: false,
                dueAlertSent: false
            });

            localStorage.setItem('completedTasks', JSON.stringify(completedTasks));

            categoryTaskInput.value = '';
            taskTags.value = '';
            taskDueAt.value = '';
            taskReminderMinutes.value = '0';
            taskRecurring.value = 'none';
            taskPriority.value = 'medium';

            materializeRecurringTasksUpTo(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0));
            renderCategoryTasks(activeCategory);
            renderCalendar();
            selectedDate = new Date(now);
            updateTaskDisplay();
            checkReminders();
        }

        function deleteCategoryTask(dateKey, taskIndex) {
            if (!completedTasks[dateKey] || taskIndex < 0 || taskIndex >= completedTasks[dateKey].length) {
                return;
            }

            completedTasks[dateKey].splice(taskIndex, 1);
            if (completedTasks[dateKey].length === 0) {
                delete completedTasks[dateKey];
            }

            localStorage.setItem('completedTasks', JSON.stringify(completedTasks));

            renderCategoryTasks(activeCategory);
            renderCalendar();
            updateTaskDisplay();
            renderKanban();
            categoryTaskInput.focus();
        }

        function toggleTaskDone(dateKey, taskIndex) {
            if (!completedTasks[dateKey] || taskIndex < 0 || taskIndex >= completedTasks[dateKey].length) {
                return;
            }

            const task = completedTasks[dateKey][taskIndex];
            task.done = !task.done;
            task.status = task.done ? 'done' : 'todo';

            localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            updateTaskDisplay();
            renderCategoryTasks(activeCategory);
            renderKanban();
        }

        function runPageTurn(shouldOpen) {
            isTurningPage = true;

            openBook.classList.add('book-turning', 'right-away');

            if (shouldOpen) {
                openBook.classList.add('category-open');
            } else {
                openBook.classList.remove('category-open');
            }

            let turnFinished = false;
            function finishTurn() {
                if (turnFinished) {
                    return;
                }
                turnFinished = true;
                openBook.classList.remove('book-turning');
                if (!shouldOpen) {
                    openBook.classList.remove('right-away');
                }
                isTurningPage = false;

                if (shouldOpen) {
                    categoryTaskInput.disabled = false;
                    addCategoryTaskBtn.disabled = false;
                    categoryTaskInput.focus();
                }
            }

            turningPage.addEventListener('transitionend', function(event) {
                if (event.propertyName === 'transform') {
                    finishTurn();
                }
            }, { once: true });

            // Fallback in case transitionend does not fire on some browsers.
            setTimeout(finishTurn, pageTurnDuration + 120);
        }

        function renderCategoryTasks(categoryName) {
            const tasks = getTasksByCategory(categoryName);

            if (tasks.length === 0) {
                categoryTaskList.innerHTML = '<p class="category-empty">No tasks saved for this category yet.</p>';
                return;
            }

            let html = '';
            tasks.forEach(function(task) {
                const meta = [];
                if (task.priority) {
                    meta.push('Priority: ' + task.priority);
                }
                if (task.recurring && task.recurring !== 'none') {
                    meta.push('Repeat: ' + task.recurring);
                }
                if (task.dueAt) {
                    meta.push('Due: ' + new Date(task.dueAt).toLocaleString());
                }
                if (task.tags && task.tags.length > 0) {
                    meta.push('#' + task.tags.join(' #'));
                }

                html += `
                    <div class="category-task-item">
                        <div class="category-task-head">
                            <span class="task-time">${task.time || '--:--'}</span>
                            <span class="category-task-date">${task.prettyDate}</span>
                        </div>
                        <div class="category-task-body">
                            <div class="task-text">${escapeHtml(task.text)}</div>
                            <button class="delete-task-btn" data-date-key="${task.dateKey}" data-task-index="${task.sourceIndex}">Delete</button>
                        </div>
                        <div class="category-task-meta">${escapeHtml(meta.join(' • '))}</div>
                    </div>
                `;
            });

            categoryTaskList.innerHTML = html;
        }

        function getTasksByCategory(categoryName) {
            const results = [];

            Object.keys(completedTasks).forEach(function(dateKey) {
                const tasks = completedTasks[dateKey] || [];
                tasks.forEach(function(task, index) {
                    if (task.category === categoryName) {
                        results.push({
                            text: task.text,
                            time: task.time,
                            dateKey: dateKey,
                            sourceIndex: index,
                            priority: task.priority || 'medium',
                            recurring: task.recurring || 'none',
                            dueAt: task.dueAt || null,
                            tags: Array.isArray(task.tags) ? task.tags : [],
                            prettyDate: new Date(dateKey + 'T00:00:00').toLocaleDateString()
                        });
                    }
                });
            });

            results.sort(function(a, b) {
                return new Date(b.dateKey) - new Date(a.dateKey);
            });

            return results;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeStoredTasks() {
            let changed = false;

            Object.keys(completedTasks).forEach(function(dateKey) {
                const tasks = completedTasks[dateKey];
                if (!Array.isArray(tasks)) {
                    completedTasks[dateKey] = [];
                    changed = true;
                    return;
                }

                tasks.forEach(function(task) {
                    if (!task.id) {
                        task.id = createTaskId();
                        changed = true;
                    }

                    if (!task.category) {
                        task.category = 'Others';
                        changed = true;
                    }

                    if (typeof task.done !== 'boolean') {
                        task.done = false;
                        changed = true;
                    }

                    if (!task.status) {
                        task.status = task.done ? 'done' : 'todo';
                        changed = true;
                    }

                    if (!task.priority) {
                        task.priority = 'medium';
                        changed = true;
                    }

                    if (!Array.isArray(task.tags)) {
                        task.tags = [];
                        changed = true;
                    }

                    if (!task.recurring) {
                        task.recurring = 'none';
                        changed = true;
                    }

                    if (!task.recurrenceRootId) {
                        task.recurrenceRootId = task.id;
                        changed = true;
                    }

                    if (typeof task.isRecurringInstance !== 'boolean') {
                        task.isRecurringInstance = false;
                        changed = true;
                    }

                    if (typeof task.reminderSent !== 'boolean') {
                        task.reminderSent = false;
                        changed = true;
                    }

                    if (typeof task.dueAlertSent !== 'boolean') {
                        task.dueAlertSent = false;
                        changed = true;
                    }
                });
            });

            if (changed) {
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            }
        }

        function createTaskId() {
            return 'task-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        }

        function applySavedTheme() {
            const mode = localStorage.getItem('themeMode') || 'light';
            document.body.classList.toggle('dark-mode', mode === 'dark');
            darkModeToggle.textContent = mode === 'dark' ? 'Light Mode' : 'Dark Mode';
        }

        function getNextRecurringDate(baseDate, recurring) {
            const next = new Date(baseDate);
            if (recurring === 'daily') {
                next.setDate(next.getDate() + 1);
            } else if (recurring === 'weekly') {
                next.setDate(next.getDate() + 7);
            } else if (recurring === 'monthly') {
                next.setMonth(next.getMonth() + 1);
            }
            return next;
        }

        function materializeRecurringTasksUpTo(targetDate) {
            let changed = false;
            const snapshot = JSON.parse(JSON.stringify(completedTasks));

            Object.keys(snapshot).forEach(function(dateKey) {
                const tasks = snapshot[dateKey] || [];
                tasks.forEach(function(task) {
                    if (!task.recurring || task.recurring === 'none' || task.isRecurringInstance) {
                        return;
                    }

                    const rootId = task.recurrenceRootId || task.id;
                    let cursor = new Date(dateKey + 'T00:00:00');

                    while (true) {
                        cursor = getNextRecurringDate(cursor, task.recurring);
                        if (cursor > targetDate) {
                            break;
                        }

                        const nextDateKey = cursor.toISOString().split('T')[0];
                        if (!completedTasks[nextDateKey]) {
                            completedTasks[nextDateKey] = [];
                        }

                        const alreadyExists = completedTasks[nextDateKey].some(function(existingTask) {
                            return existingTask.recurrenceRootId === rootId && existingTask.isRecurringInstance;
                        });

                        if (alreadyExists) {
                            continue;
                        }

                        completedTasks[nextDateKey].push({
                            id: createTaskId(),
                            text: task.text,
                            time: task.time,
                            category: task.category,
                            done: false,
                            status: 'todo',
                            priority: task.priority || 'medium',
                            tags: Array.isArray(task.tags) ? task.tags.slice() : [],
                            recurring: task.recurring,
                            recurrenceRootId: rootId,
                            isRecurringInstance: true,
                            dueAt: null,
                            reminderAt: null,
                            reminderSent: false,
                            dueAlertSent: false
                        });
                        changed = true;
                    }
                });
            });

            if (changed) {
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            }
        }

        function renderKanban() {
            if (!selectedDate) {
                kanbanBoard.innerHTML = '<h3 class="kanban-title">Kanban (Select a date)</h3>';
                return;
            }

            const dateKey = selectedDate.toISOString().split('T')[0];
            const tasks = completedTasks[dateKey] || [];

            const columns = {
                todo: [],
                doing: [],
                done: []
            };

            tasks.forEach(function(task, index) {
                const status = task.status || (task.done ? 'done' : 'todo');
                if (!columns[status]) {
                    columns.todo.push({ task: task, index: index });
                } else {
                    columns[status].push({ task: task, index: index });
                }
            });

            function renderCards(entries, columnKey) {
                if (entries.length === 0) {
                    return '<div class="kanban-card">No tasks</div>';
                }

                return entries.map(function(entry) {
                    return `
                        <div class="kanban-card">
                            <div>${escapeHtml(entry.task.text)}</div>
                            <button class="kanban-next-btn" data-column="${columnKey}" data-date-key="${dateKey}" data-task-index="${entry.index}">Next Stage</button>
                        </div>
                    `;
                }).join('');
            }

            kanbanBoard.innerHTML = `
                <h3 class="kanban-title">Kanban for ${selectedDate.toLocaleDateString()}</h3>
                <div class="kanban-columns">
                    <div class="kanban-column"><h4>To Do</h4>${renderCards(columns.todo, 'todo')}</div>
                    <div class="kanban-column"><h4>Doing</h4>${renderCards(columns.doing, 'doing')}</div>
                    <div class="kanban-column"><h4>Done</h4>${renderCards(columns.done, 'done')}</div>
                </div>
            `;
        }

        function cycleTaskStatus(dateKey, taskIndex) {
            if (!completedTasks[dateKey] || taskIndex < 0 || taskIndex >= completedTasks[dateKey].length) {
                return;
            }

            const task = completedTasks[dateKey][taskIndex];
            if (task.status === 'todo') {
                task.status = 'doing';
                task.done = false;
            } else if (task.status === 'doing') {
                task.status = 'done';
                task.done = true;
            } else {
                task.status = 'todo';
                task.done = false;
            }

            localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            updateTaskDisplay();
            renderCategoryTasks(activeCategory);
            renderKanban();
        }

        function showReminderToast(message) {
            const toast = document.createElement('div');
            toast.className = 'reminder-toast';
            toast.textContent = message;
            reminderHub.appendChild(toast);

            setTimeout(function() {
                toast.remove();
            }, 5500);
        }

        function checkReminders() {
            const now = Date.now();
            let changed = false;

            Object.keys(completedTasks).forEach(function(dateKey) {
                (completedTasks[dateKey] || []).forEach(function(task) {
                    if (task.reminderAt && !task.reminderSent && new Date(task.reminderAt).getTime() <= now) {
                        const reminderMessage = 'Reminder: ' + task.text;
                        showReminderToast(reminderMessage);
                        if (window.Notification && Notification.permission === 'granted') {
                            new Notification('Task Reminder', { body: reminderMessage });
                        }
                        task.reminderSent = true;
                        changed = true;
                    }

                    if (task.dueAt && !task.dueAlertSent && new Date(task.dueAt).getTime() <= now && !task.done) {
                        const dueMessage = 'Deadline reached: ' + task.text;
                        showReminderToast(dueMessage);
                        if (window.Notification && Notification.permission === 'granted') {
                            new Notification('Task Deadline', { body: dueMessage });
                        }
                        task.dueAlertSent = true;
                        changed = true;
                    }
                });
            });

            if (changed) {
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            }
        }
